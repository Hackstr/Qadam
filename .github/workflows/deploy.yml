name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qadam_frontend/package-lock.json

      - name: Install frontend deps
        run: cd qadam_frontend && npm ci

      - name: TypeScript check
        run: cd qadam_frontend && npx tsc --noEmit

  deploy:
    name: Deploy
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            export PATH="$HOME/.asdf/shims:$HOME/.asdf/bin:$PATH"
            cd /home/ubuntu/qadam

            echo "=== Pull ==="
            git pull origin main

            echo "=== Frontend ==="
            cd /home/ubuntu/qadam/qadam_frontend
            npm install --prefer-offline 2>/dev/null
            NODE_ENV=production npx next build
            sudo systemctl restart qadam-frontend

            echo "=== Backend ==="
            cd /home/ubuntu/qadam/qadam_backend
            source /home/ubuntu/qadam/.env.production
            MIX_ENV=prod mix deps.get --only prod
            MIX_ENV=prod mix compile
            MIX_ENV=prod mix ecto.migrate
            sudo systemctl restart qadam-backend

            echo "=== Healthcheck ==="
            sleep 5
            curl -sf http://127.0.0.1:3000 > /dev/null && echo "Frontend: OK" || echo "Frontend: FAIL"
            curl -sf http://127.0.0.1:4000/api/health && echo "Backend: OK" || echo "Backend: FAIL"
